<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City Break Into Strata</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    body {
      cursor: pointer;
    }

    .scene-wrap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #aaa;
    }

    svg,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    canvas {
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="scene-wrap" id="sceneWrap">
    <svg id="citySVG" viewBox="0 0 1600 900" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#d8d8d8"/>
          <stop offset="45%" stop-color="#9a9a9a"/>
          <stop offset="100%" stop-color="#5d5d5d"/>
        </linearGradient>

        <linearGradient id="streetGlow" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7c7c7c"/>
          <stop offset="100%" stop-color="#171717"/>
        </linearGradient>
      </defs>

      <rect width="1600" height="900" fill="url(#sky)" />

      <path
        d="M0 135 C240 65 355 95 520 55 C720 5 850 55 980 35 C1160 7 1300 75 1600 25 L1600 0 L0 0 Z"
        fill="#eeeeee"
        opacity="0.65"
      />

      <path
        d="M0 190 C210 130 410 170 615 115 C800 67 970 122 1175 82 C1350 48 1470 95 1600 70 L1600 0 L0 0 Z"
        fill="#cfcfcf"
        opacity="0.75"
      />

      <g fill="#505050">
        <rect x="80" y="310" width="70" height="290"/>
        <rect x="170" y="260" width="95" height="340"/>
        <rect x="290" y="345" width="70" height="255"/>
        <rect x="390" y="210" width="130" height="390"/>
        <rect x="560" y="285" width="90" height="315"/>
        <rect x="690" y="235" width="120" height="365"/>
        <rect x="850" y="330" width="90" height="270"/>
        <rect x="970" y="180" width="145" height="420"/>
        <rect x="1140" y="300" width="95" height="300"/>
        <rect x="1260" y="250" width="120" height="350"/>
        <rect x="1410" y="340" width="75" height="260"/>
      </g>

      <g fill="#292929">
        <path d="M70 600 L95 220 L150 600 Z"/>
        <path d="M210 600 L230 130 L280 600 Z"/>
        <path d="M410 600 L455 90 L535 600 Z"/>
        <path d="M760 600 L800 170 L860 600 Z"/>
        <path d="M1010 600 L1055 100 L1130 600 Z"/>
        <path d="M1320 600 L1375 150 L1440 600 Z"/>
      </g>

      <g fill="#0e0e0e">
        <path d="M110 610 L150 210 L280 180 L315 610 Z"/>
        <path d="M330 610 L365 310 L470 280 L520 610 Z"/>
        <path d="M545 610 L590 105 L720 75 L785 610 Z"/>
        <path d="M815 610 L850 245 L955 210 L1010 610 Z"/>
        <path d="M1060 610 L1110 130 L1230 105 L1290 610 Z"/>
        <path d="M1340 610 L1390 280 L1515 240 L1560 610 Z"/>
      </g>

      <g fill="#bdbdbd" opacity="0.36">
        <path d="M175 235 L260 220 L268 600 L205 600 Z"/>
        <path d="M615 125 L700 105 L715 600 L660 600 Z"/>
        <path d="M1135 150 L1210 135 L1220 600 L1168 600 Z"/>
      </g>

      <path
        d="M0 650 C230 570 440 680 660 605 C860 535 1040 620 1230 565 C1410 515 1510 590 1600 545 L1600 900 L0 900 Z"
        fill="#181818"
      />

      <path
        d="M0 720 C260 650 470 760 720 680 C900 620 1115 700 1320 650 C1460 615 1540 660 1600 635 L1600 900 L0 900 Z"
        fill="#070707"
      />

      <path
        d="M0 740 C360 670 760 710 1600 620 L1600 700 C850 760 390 780 0 850 Z"
        fill="url(#streetGlow)"
        opacity="0.95"
      />

      <path
        d="M0 805 C330 760 780 780 1600 705 L1600 750 C830 830 410 855 0 890 Z"
        fill="#2e2e2e"
      />

      <g stroke="#c9c9c9" stroke-width="10" opacity="0.65">
        <path d="M80 815 C420 760 900 755 1510 680"/>
        <path d="M310 865 C610 815 1050 800 1600 735"/>
      </g>

      <g stroke="#050505" stroke-width="18" opacity="0.95">
        <path d="M0 690 C400 620 860 650 1600 560"/>
        <path d="M0 765 C390 715 905 720 1600 650"/>
      </g>

      <g fill="#101010">
        <path d="M70 900 L145 735 L260 900 Z"/>
        <path d="M340 900 L410 760 L560 900 Z"/>
        <path d="M1130 900 L1215 710 L1350 900 Z"/>
        <path d="M1450 900 L1510 735 L1600 900 Z"/>
      </g>

      <g fill="#030303">
        <path d="M935 680 l12 -45 l12 45 z"/>
        <rect x="944" y="680" width="8" height="44"/>
        <path d="M970 695 l8 -34 l8 34 z"/>
        <rect x="976" y="695" width="5" height="30"/>
      </g>

      <g fill="#dedede" opacity="0.5">
        <path d="M210 665 L445 615 L430 640 L185 690 Z"/>
        <path d="M570 690 L805 645 L785 668 L545 720 Z"/>
        <path d="M1030 625 L1320 570 L1290 600 L1010 655 Z"/>
      </g>
    </svg>

    <canvas id="canvas"></canvas>
  </div>

  <script>
    const wrap = document.getElementById("sceneWrap");
    const svg = document.getElementById("citySVG");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let pieces = [];
    let animationId = null;
    let started = false;

    const TILE = 12;

    let groundMap = [];
    let settledPieces = [];

    function resizeCanvas() {
      const rect = wrap.getBoundingClientRect();

      canvas.width = Math.floor(rect.width * devicePixelRatio);
      canvas.height = Math.floor(rect.height * devicePixelRatio);
      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    function svgToImage(callback) {
      const svgText = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const img = new Image();

      img.onload = () => {
        callback(img);
        URL.revokeObjectURL(url);
      };

      img.src = url;
    }

    function initGroundMap(width, height) {
      const cols = Math.ceil(width / TILE);
      groundMap = [];
      settledPieces = [];

      for (let i = 0; i < cols; i++) {
        groundMap[i] = height - TILE;
      }
    }

    function createPieces(img) {
      const rect = wrap.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      pieces = [];
      initGroundMap(w, h);

      for (let y = 0; y < h; y += TILE) {
        for (let x = 0; x < w; x += TILE) {
          const centerX = x - w / 2;
          const centerY = y - h / 2;
          const dist = Math.sqrt(centerX * centerX + centerY * centerY);

          pieces.push({
            sx: x,
            sy: y,
            sw: TILE,
            sh: TILE,

            x,
            y,

            vx: (Math.random() - 0.5) * 2.6 + centerX / w * 2.1,
            vy: -Math.random() * 4.5 - 1,

            rot: 0,
            vr: (Math.random() - 0.5) * 0.12,

            delay: dist * 0.45 + Math.random() * 180,
            active: false,
            settled: false
          });
        }
      }

      pieces.image = img;
    }

    function getColumn(x) {
      return Math.max(
        0,
        Math.min(groundMap.length - 1, Math.floor(x / TILE))
      );
    }

    function getGroundY(x) {
      const col = getColumn(x);
      return groundMap[col];
    }

    function settlePiece(piece) {
      const centerX = piece.x + piece.sw / 2;
      const col = getColumn(centerX);
      const targetY = groundMap[col];

      piece.y = targetY;
      piece.vx = 0;
      piece.vy = 0;
      piece.vr = 0;
      piece.rot = 0;
      piece.settled = true;

      groundMap[col] -= TILE;

      if (groundMap[col - 1] !== undefined) {
        groundMap[col - 1] -= TILE * 0.18;
      }

      if (groundMap[col + 1] !== undefined) {
        groundMap[col + 1] -= TILE * 0.18;
      }

      settledPieces.push(piece);
    }

    function drawPiece(piece, img) {
      const rect = wrap.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.save();

      ctx.translate(piece.x + piece.sw / 2, piece.y + piece.sh / 2);
      ctx.rotate(piece.rot);

      ctx.drawImage(
        img,
        piece.sx * img.width / w,
        piece.sy * img.height / h,
        piece.sw * img.width / w,
        piece.sh * img.height / h,
        -piece.sw / 2,
        -piece.sh / 2,
        piece.sw,
        piece.sh
      );

      if (piece.settled) {
        ctx.globalCompositeOperation = "source-atop";

        const layerShade = Math.floor(piece.y / TILE) % 5;

        if (layerShade === 0) {
          ctx.fillStyle = "rgba(255, 255, 255, 0.10)";
        } else if (layerShade === 1) {
          ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
        } else if (layerShade === 2) {
          ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
        } else {
          ctx.fillStyle = "rgba(0, 0, 0, 0.20)";
        }

        ctx.fillRect(-piece.sw / 2, -piece.sh / 2, piece.sw, piece.sh);
      }

      ctx.restore();
    }

    function drawStrataLines() {
      const rect = wrap.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.save();
      ctx.globalAlpha = 0.34;
      ctx.lineWidth = 2;

      for (let y = h - TILE * 2; y > h * 0.42; y -= TILE * 2.4) {
        ctx.beginPath();

        for (let x = 0; x <= w; x += 28) {
          const wave = Math.sin(x * 0.018 + y * 0.04) * 5;
          const yy = y + wave;

          if (x === 0) {
            ctx.moveTo(x, yy);
          } else {
            ctx.lineTo(x, yy);
          }
        }

        ctx.strokeStyle =
          y % 48 < 24
            ? "rgba(255,255,255,0.35)"
            : "rgba(0,0,0,0.35)";

        ctx.stroke();
      }

      ctx.restore();
    }

    function drawDust() {
      const rect = wrap.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;

      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = "#d8d8d8";

      for (let i = 0; i < 70; i++) {
        const x = Math.random() * w;
        const y = h * 0.55 + Math.random() * h * 0.3;
        const size = Math.random() * 2.4 + 0.5;

        ctx.fillRect(x, y, size, size);
      }

      ctx.restore();
    }

    function animate(time) {
      const rect = wrap.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const img = pieces.image;

      ctx.clearRect(0, 0, w, h);

      for (const p of settledPieces) {
        drawPiece(p, img);
      }

      drawStrataLines();

      for (const p of pieces) {
        if (p.settled) continue;

        if (time > p.delay) {
          p.active = true;
        }

        if (p.active) {
          p.vy += 0.22;
          p.vx *= 0.992;

          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;

          if (p.x < 0) {
            p.x = 0;
            p.vx *= -0.25;
          }

          if (p.x > w - TILE) {
            p.x = w - TILE;
            p.vx *= -0.25;
          }

          const groundY = getGroundY(p.x + p.sw / 2);

          if (p.y >= groundY) {
            settlePiece(p);
            continue;
          }
        }

        drawPiece(p, img);
      }

      drawDust();

      const moving = pieces.some(p => !p.settled);

      if (moving) {
        animationId = requestAnimationFrame(animate);
      } else {
        drawStrataLines();
      }
    }

    function startBreak() {
      if (started) {
        resetScene();
        setTimeout(startBreak, 80);
        return;
      }

      started = true;
      resizeCanvas();

      svgToImage((img) => {
        createPieces(img);
        svg.style.opacity = 0;
        animate(0);
      });
    }

    function resetScene() {
      cancelAnimationFrame(animationId);

      pieces = [];
      settledPieces = [];
      groundMap = [];
      started = false;

      svg.style.opacity = 1;

      const rect = wrap.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
    }

    document.body.addEventListener("click", startBreak);

    window.addEventListener("resize", () => {
      resizeCanvas();
      resetScene();
    });

    resizeCanvas();
  </script>
</body>
</html>
